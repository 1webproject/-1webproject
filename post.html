<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Details - Social Media Platform</title>
</head>

<body>
    <header>
        <nav>
            <h1>SocialHub</h1>
            <ul>
                <li><a href="feed.html">Feed</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="single-post">
            <h2>Post Details</h2>

            <article class="post">
                <header>
                    <img src="images/user1.jpg" alt="Profile picture of Taiser" width="50" height="50" />
                    <div>
                        <h3>Taiser Alatie</h3>
                        <p>3 hours ago</p>
                    </div>
                </header>

                <p>This is my first post on this platform!</p>

                <footer>
                    <p>12 Likes</p>
                </footer>
            </article>
        </section>

        <section class="comments">
            <h2>Comments</h2>

            <article class="comment">
                <h3>Ammar</h3>
                <p>Nice post!</p>
            </article>

            <article class="comment">
                <h3>Mohammed</h3>
                <p>Good luck with the project.</p>
            </article>
        </section>

        <section class="add-comment">
            <h2>Add a Comment</h2>
            <form>
                <label for="commentText">Your Comment</label>
                <textarea id="commentText" name="commentText" rows="3"
                    placeholder="Write your comment here..."></textarea>
                <button type="submit">Add Comment</button>
            </form>
        </section>
    </main>
</body>

</html>
