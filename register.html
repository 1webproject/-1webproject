<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Seraj</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card register-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join Seraj in under a minute</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Your username" />
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@gmail.com" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="At least 6 characters" />
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required placeholder="Re-enter password" />
                </div>

                <div class="form-group">
                    <label for="profile-picture">Profile Picture URL (optional)</label>
                    <input type="url" id="profile-picture" name="profile-picture" placeholder="https://example.com/avatar.jpg" />
                </div>

                <div class="form-group">
                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div id="register-error" class="error-message" role="alert" aria-live="polite"></div>
                <button type="submit" class="register-button">Sign Up</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log In</a></p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="out-login.js"></script>
</body>

</html>
